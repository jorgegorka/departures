acme_full:
  project_id: <%= ActiveRecord::FixtureSet.identify(:acme_default) %>
  workspace_id: <%= ActiveRecord::FixtureSet.identify(:acme) %>
  name: Acme full access
  prefix: dp_acmeacmea
  key_hash: <%= Digest::SHA256.hexdigest("dp_" + "acme" * 12) %>
  scopes: ["send", "read:activity"]
  created_at: <%= Time.now %>
  updated_at: <%= Time.now %>

